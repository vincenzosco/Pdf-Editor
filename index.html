<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Editor</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- PDF.js for rendering -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <!-- pdf-lib for PDF editing -->
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
  <!-- App Header -->
  <header class="app-header">
    <div class="header-left">
      <svg class="app-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
        <polyline points="14 2 14 8 20 8"></polyline>
        <line x1="16" y1="13" x2="8" y2="13"></line>
        <line x1="16" y1="17" x2="8" y2="17"></line>
        <polyline points="10 9 9 9 8 9"></polyline>
      </svg>
      <h1 class="app-title">PDF Editor</h1>
      <span class="page-count" id="pageCount" style="display:none;"></span>
    </div>
    <div class="header-right">
      <button class="btn btn-primary" id="downloadBtn" style="display:none;" onclick="downloadPDF()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        Download PDF
      </button>
    </div>
  </header>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar" style="display:none;">
    <div class="toolbar-group">
      <label class="toolbar-btn" title="Upload PDF" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept=".pdf" style="display:none;" onchange="handleFileUpload(event)" />
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        <span>Open</span>
      </label>
      <label class="toolbar-btn" title="Merge PDF" onclick="document.getElementById('mergeInput').click()">
        <input type="file" id="mergeInput" accept=".pdf" style="display:none;" onchange="handleMergeUpload(event)" />
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3v18"></path>
          <path d="M8 7l4-4 4 4"></path>
          <path d="M8 17l4 4 4-4"></path>
        </svg>
        <span>Merge</span>
      </label>
    </div>
    <div class="toolbar-divider"></div>
    <div class="toolbar-group">
      <button class="toolbar-btn" id="rotateCWBtn" title="Rotate Clockwise" onclick="rotatePages(90)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
        <span>Rotate CW</span>
      </button>
      <button class="toolbar-btn" id="rotateCCWBtn" title="Rotate Counter-Clockwise" onclick="rotatePages(-90)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"></polyline>
          <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
        </svg>
        <span>Rotate CCW</span>
      </button>
    </div>
    <div class="toolbar-divider"></div>
    <div class="toolbar-group">
      <button class="toolbar-btn" id="selectAllBtn" title="Select All" onclick="selectAllPages()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="9" y1="12" x2="15" y2="12"></line>
        </svg>
        <span>Select All</span>
      </button>
      <button class="toolbar-btn toolbar-btn-danger" id="deleteBtn" title="Delete Selected" onclick="deletePages()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"></polyline>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
        <span>Delete</span>
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Drop Zone (empty state) -->
    <div class="drop-zone" id="dropZone">
      <div class="drop-zone-content">
        <svg class="drop-zone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="12" y1="18" x2="12" y2="12"></line>
          <line x1="9" y1="15" x2="12" y2="12"></line>
          <line x1="15" y1="15" x2="12" y2="12"></line>
        </svg>
        <h2 class="drop-zone-title">Drop your PDF here</h2>
        <p class="drop-zone-subtitle">or click to browse files</p>
        <input type="file" id="dropInput" accept=".pdf" style="display:none;" onchange="handleFileUpload(event)" />
        <button class="btn btn-primary btn-lg" onclick="document.getElementById('dropInput').click()">
          Choose PDF
        </button>
      </div>
    </div>

    <!-- Loading State -->
    <div class="loading-state" id="loadingState" style="display:none;">
      <div class="spinner"></div>
      <p class="loading-text">Processing PDF...</p>
    </div>

    <!-- Error State -->
    <div class="error-state" id="errorState" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="15" y1="9" x2="9" y2="15"></line>
        <line x1="9" y1="9" x2="15" y2="15"></line>
      </svg>
      <h3>Something went wrong</h3>
      <p id="errorMessage">Could not process the PDF file.</p>
      <button class="btn btn-primary" onclick="resetState()">Try Again</button>
    </div>

    <!-- Page Grid -->
    <div class="page-grid" id="pageGrid" style="display:none;"></div>
  </main>

  <!-- Page Preview Modal -->
  <div class="modal-overlay" id="previewModal" style="display:none;" onclick="closePreview()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span class="modal-title" id="previewTitle">Page Preview</span>
        <button class="modal-close" onclick="closePreview()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="previewBody"></div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/script.js"></script>
</body>
</html>
